version: '3.8'

services:
  backend:
    build: .
    container_name: safety_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/safetydb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./safety_report_trial/backend:/app/backend

  db:
    image: postgres:14
    container_name: safety_postgres
    environment:
      POSTGRES_DB: safetydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: safety_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    build: .
    container_name: safety_celery
    command: celery -A backend.workers.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/safetydb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - db
      - redis
    volumes:
      - ./safety_report_trial/backend:/app/backend

volumes:
  postgres_data:
  redis_data:
