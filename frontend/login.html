<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - AI Safety Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Segoe UI, Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: rgba(2,6,23,0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 16px #1e293b;
            width: 350px;
        }
        .login-box h2 {
            color: #38bdf8;
            margin-bottom: 24px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #2563eb;
        }
    </style>
    <script>
        const user = localStorage.getItem("username");
        if (user) {
            window.location.replace("dashboard.html");
        }
    </script>
</head>
<body>
    <div class="login-box">
        <h2>Login to AI Safety</h2>
        <input id="username" type="text" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="loginUser()">Login</button>
    </div>
    <script>
    async function loginUser(){
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const res = await fetch("http://127.0.0.1:9000/api/simple-login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:username,
                password:password
            })
        });
        const data = await res.json();
        if(data.success){
            localStorage.setItem("auth_token","true");
            localStorage.setItem("username",username);
            window.location.replace("dashboard.html");
        }else{
            alert("Invalid username or password");
        }
    }
    </script>
</body>
</html>
