<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Safety Assistant</title>
<style>
body{
margin:0;
font-family:Segoe UI;
display:flex;
height:100vh;
background:#0f172a;
color:white;
}
.sidebar{
width:230px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
}
.sidebar h2{
color:#38bdf8;
margin-bottom:30px;
}
.sidebar a{
text-decoration:none;
color:white;
padding:12px;
border-radius:6px;
margin-bottom:10px;
}
.sidebar a:hover{
background:#1e293b;
}
.main{
flex:1;
display:flex;
flex-direction:column;
}
.chat-header{
padding:15px;
background:#020617;
border-bottom:1px solid #1e293b;
}
.chat-area{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}
.message{
max-width:60%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
}
.user{
align-self:flex-end;
background:#2563eb;
}
.bot{
align-self:flex-start;
background:#1e293b;
}
.chat-input{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
}
.chat-input input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
outline:none;
}
.chat-input button{
margin-left:10px;
padding:10px 15px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}
</style>
</head>
<body>
<script>
if (!localStorage.getItem("jwt_token")) {
	window.location.href = "login.html";
}
</script>
<!-- SIDEBAR -->
<div class="sidebar">
<h2>AI Safety</h2>
<a href="index.html">Dashboard</a>
<a href="generate_report.html">Reports</a>
<a href="upload.html">Upload</a>
<a href="analytics.html">Analytics</a>
<a href="chatbot_dashboard.html">AI Chat</a>
</div>
<!-- MAIN CHAT AREA -->
<div class="main">
	<div class="nav-user">
		<button onclick="logoutUser()">Logout</button>
	</div>
<div class="chat-header">
AI Safety Assistant
</div>
<div class="chat-area" id="chatArea">
<div class="message bot">
Hello! Ask me about AI safety reports.
</div>
</div>
<div class="chat-input">
<input id="userInput" placeholder="Ask AI something...">
<button onclick="sendMessage()">Send</button>
</div>
</div>
<script>
function sendMessage(){
let input=document.getElementById("userInput")
let text=input.value.trim()
if(text==="") return
let chat=document.getElementById("chatArea")
chat.innerHTML+=`<div class="message user">${text}</div>`
input.value=""
setTimeout(()=>{
chat.innerHTML+=`<div class="message bot">Processing request...</div>`
chat.scrollTop=chat.scrollHeight
},500)
}
</script>
<script>
function logoutUser() {
	localStorage.removeItem("jwt_token");
	window.location.href = "login.html";
}
</script>
</body>
</html>
