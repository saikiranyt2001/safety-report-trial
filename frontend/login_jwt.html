<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: Arial; background: #f4f6f9; margin: 0; }
    .container { background: white; padding: 40px; border-radius: 10px; max-width: 400px; margin: 80px auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 30px; }
    input { width: 100%; padding: 12px; margin-bottom: 18px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
    button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #loginStatus { margin-top: 20px; color: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="loginUser()">Login</button>
    <div id="loginStatus"></div>
    <a href="ai_report_chat.html">Go to AI Report Chat</a>
  </div>
  <script>
    function loginUser() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
      })
      .then(res => res.json())
      .then(data => {
        if (data.access_token) {
          localStorage.setItem('jwt', data.access_token);
          document.getElementById('loginStatus').innerText = 'Login successful!';
        } else {
          document.getElementById('loginStatus').innerText = 'Login failed.';
        }
      });
    }
  </script>
</body>
</html>
