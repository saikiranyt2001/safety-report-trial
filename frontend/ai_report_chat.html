<!DOCTYPE html>
<html>
<head>
  <title>AI Report Chat</title>
  <style>
    body { font-family: Arial; background: #f4f6f9; margin: 0; }
    .container { background: white; padding: 40px; border-radius: 10px; max-width: 600px; margin: 40px auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 30px; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 18px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
    button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #chatAnswer { margin-top: 20px; background: #e0e7ef; padding: 16px; border-radius: 6px; }
  </style>
</head>
<body>
<script>
if (!localStorage.getItem("jwt_token")) {
  window.location.href = "login.html";
}
</script>
  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">AI Safety</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="generate_report.html">Reports</a>
      <a href="upload.html">Upload</a>
      <a href="analytics.html">Analytics</a>
      <a href="compliance_agent.html">Compliance</a>
      <a href="risk_assessment.html">Risk</a>
      <a href="recommendations.html">Recommendations</a>
      <a href="ai_report_chat.html">Chatbot</a>
      <a href="project_management.html">Projects</a>
    </div>
    <div class="nav-user" id="profileDropdown">
      <span id="profileInfo"></span>
      <button onclick="logoutUser()">Logout</button>
    </div>
  </div>
  <div class="container">
    <h2>Ask About a Safety Report</h2>
    <input type="number" id="reportId" placeholder="Report ID">
    <textarea id="chatQuestion" rows="4" placeholder="Ask a question about hazards or regulations..."></textarea>
    <button onclick="askReportChat()">Ask</button>
    <div id="chatAnswer"></div>
    <a href="document_generation.html">Go to Document Generation</a>
  </div>
  <script>
    function askReportChat() {
      const reportId = document.getElementById('reportId').value;
      const question = document.getElementById('chatQuestion').value;
      fetch('/api/report-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ report_id: parseInt(reportId), question })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('chatAnswer').innerText = data.answer || 'No answer.';
      });
    }
  </script>
<script>
function logoutUser() {
  localStorage.removeItem("jwt_token");
  window.location.href = "login.html";
}

// Fetch user profile and show dropdown
async function loadProfile() {
  const token = localStorage.getItem("jwt_token");
  if (!token) return;
  try {
    const res = await fetch("/api/me", {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    document.getElementById("profileInfo").innerText = `${data.username} (${data.role})`;
    // Example: hide admin links if not admin
    if (data.role !== "admin") {
      // Hide admin-only links here
    }
  } catch (e) {
    document.getElementById("profileInfo").innerText = "User";
  }
}
loadProfile();
</script>
</body>
</html>
