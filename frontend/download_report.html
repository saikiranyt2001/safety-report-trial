<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Report Download</title>
</head>
<body>
  <h2>Download PDF Report</h2>
  <form id="pdfForm">
    <label>Report ID: <input type="text" name="report_id" required></label><br>
    <button type="submit">Download</button>
  </form>
  <div id="pdfResult"></div>
  <script>
    document.getElementById('pdfForm').onsubmit = async function(e) {
      e.preventDefault();
      const form = e.target;
      const res = await fetch(`/api/download-report/${form.report_id.value}`);
      if (res.ok) {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `report_${form.report_id.value}.pdf`;
        a.click();
        document.getElementById('pdfResult').innerText = 'Download started.';
      } else {
        document.getElementById('pdfResult').innerText = 'Download failed.';
      }
    };
  </script>
</body>
</html>
