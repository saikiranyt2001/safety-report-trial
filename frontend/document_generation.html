<!DOCTYPE html>
<html>
<head>
  <title>AI Document Generation</title>
  <style>
    body { font-family: Arial; background: #f4f6f9; margin: 0; }
    .container { background: white; padding: 40px; border-radius: 10px; max-width: 600px; margin: 40px auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 30px; }
    input, select { width: 100%; padding: 12px; margin-bottom: 18px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
    button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #docResult { margin-top: 20px; background: #e0e7ef; padding: 16px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Generate Safety Document</h2>
    <select id="reportType">
      <option value="WHS">WHS Report</option>
      <option value="Incident">Incident Report</option>
      <option value="Risk">Risk Assessment</option>
      <option value="SWMS">SWMS</option>
      <option value="JSA">JSA</option>
    </select>
    <input type="number" id="projectId" placeholder="Project ID">
    <button onclick="generateDocument()">Generate Document</button>
    <div id="docResult"></div>
    <a href="ai_report_chat.html">Go to AI Report Chat</a>
  </div>
  <script>
    function generateDocument() {
      const reportType = document.getElementById('reportType').value;
      const projectId = document.getElementById('projectId').value;
      fetch('/api/generate-report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ report_type: reportType, project_id: parseInt(projectId) })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('docResult').innerText = data.document || 'No document generated.';
      });
    }
  </script>
</body>
</html>
