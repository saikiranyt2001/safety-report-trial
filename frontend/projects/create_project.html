<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Project</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="../js/auth.js"></script>

</head>

<body class="bg-gray-100">

<script>
checkAuth();
</script>

<div class="flex">

<!-- SIDEBAR -->

<div class="w-64 bg-blue-700 text-white min-h-screen p-6">

<h2 class="text-2xl font-bold mb-8">AI Safety</h2>

<a href="../dashboard.html" class="block mb-4">Dashboard</a>
<a href="../pages/upload.html" class="block mb-4">Upload</a>
<a href="../pages/analyze_image.html" class="block mb-4">Analyze Image</a>
<a href="../pages/generate_report.html" class="block mb-4">Generate Report</a>
<a href="../pages/report_history.html" class="block mb-4">Report History</a>
<a href="../pages/analytics.html" class="block mb-4">Analytics</a>
<a href="../projects/create_project.html" class="block mb-4 font-bold">Create Project</a>

</div>

<!-- MAIN CONTENT -->

<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-6">Create Project</h1>

<div class="bg-white p-8 rounded-xl shadow max-w-xl">

<form id="projectForm">

<label class="block mb-2 font-semibold">Project Name</label>

<input
type="text"
name="project_name"
class="w-full border p-2 rounded mb-4"
required
>

<label class="block mb-2 font-semibold">Location</label>

<input
type="text"
name="location"
class="w-full border p-2 rounded mb-4"
required
>

<button
type="submit"
class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700"
>
Create Project
</button>

</form>

</div>

<div id="result" class="mt-6 font-semibold text-green-600"></div>

</div>

</div>

<script>

document.getElementById("projectForm").onsubmit = async function(e){

e.preventDefault();

const form = e.target;

const res = await fetch("/api/create-project",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

project_name: form.project_name.value,
location: form.location.value

})

});

const text = await res.text();

document.getElementById("result").innerText = text;

};

</script>

</body>
</html>
