<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RAG Report Generation</title>
</head>
<body>
  <h2>Generate RAG Report</h2>
  <form id="ragForm">
    <label>Query: <input type="text" name="query" required></label><br>
    <button type="submit">Generate</button>
  </form>
  <div id="ragResult"></div>
  <script>
    document.getElementById('ragForm').onsubmit = async function(e) {
      e.preventDefault();
      const form = e.target;
      const res = await fetch('/api/generate-rag-report', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({query: form.query.value})
      });
      document.getElementById('ragResult').innerText = await res.text();
    };
  </script>
</body>
</html>
