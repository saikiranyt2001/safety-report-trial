<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Safety Platform</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* Classy gradient background */

body{
background: linear-gradient(
135deg,
#0f172a,
#1e293b,
#334155
);
min-height:100vh;
}

</style>

</head>

<body class="text-white">
<script>
if (!localStorage.getItem("jwt_token")) {
	window.location.href = "login.html";
}
</script>

<!-- NAVBAR -->
<div class="navbar">
	<div class="logo">AI Safety</div>
	<div class="nav-links">
		<a href="index.html">Home</a>
		<a href="dashboard.html">Dashboard</a>
		<a href="generate_report.html">Reports</a>
		<a href="upload.html">Upload</a>
		<a href="analytics.html">Analytics</a>
	</div>
	<div class="nav-user">
		<button onclick="logoutUser()">Logout</button>
	</div>
</div>

<a href="index.html" class="hover:text-blue-400">
Home
</a>

<a href="dashboard.html" class="hover:text-blue-400">
Dashboard
</a>

<a href="analyze_image.html" class="hover:text-blue-400">
Analyze Image
</a>

<a href="generate_report.html" class="hover:text-blue-400">
Generate Report
</a>




<!-- MAIN SECTION -->

<div class="flex items-center justify-center mt-20">

<div class="bg-white/10 backdrop-blur-lg p-10 rounded-xl shadow-xl w-[500px]">


<h2 class="text-2xl font-semibold mb-6 text-center">

Hazard Image Analysis

</h2>


<form id="imageForm">


<input
type="file"
name="file"
accept="image/*"
required
class="w-full mb-5 p-3 rounded bg-white text-black"
/>


<button
class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded font-semibold">

Analyze Image

</button>

</form>


<pre id="result"
class="mt-6 bg-black/40 p-4 rounded text-sm overflow-auto"></pre>

</div>

</div>


<!-- FEATURE BUTTONS -->

<div class="flex justify-center gap-6 mt-16">

<a href="dashboard.html"
class="bg-blue-600 px-6 py-3 rounded hover:bg-blue-700">

Dashboard

</a>

<a href="generate_report.html"
class="bg-purple-600 px-6 py-3 rounded hover:bg-purple-700">

Generate Report

</a>

<a href="analyze_image.html"
class="bg-green-600 px-6 py-3 rounded hover:bg-green-700">

Analyze Image

</a>

</div>


<!-- FOOTER -->

<footer class="text-center mt-20 text-gray-400 pb-6">

AI Safety Platform • 2026

</footer>



<script>

document.getElementById("imageForm").addEventListener("submit", async function(e){

e.preventDefault()

const formData = new FormData(this)

const response = await fetch(
"https://safety-report-trial.onrender.com/api/analyze-image",
{
method:"POST",
body:formData
})

const data = await response.json()

document.getElementById("result").textContent =
JSON.stringify(data,null,2)

})

</script>


<script>
function logoutUser() {
	localStorage.removeItem("jwt_token");
	window.location.href = "login.html";
}
</script>
</body>
</html>
