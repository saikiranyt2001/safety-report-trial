<!DOCTYPE html>
<html>
<head>
<title>Upload Files</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="../js/auth.js"></script>
</head>

<body class="bg-gray-100">

<script>
checkAuth();
</script>

<div class="flex">

<!-- SIDEBAR -->

<div class="w-64 bg-blue-700 text-white min-h-screen p-6">

<h2 class="text-2xl font-bold mb-8">AI Safety</h2>

<a href="../dashboard.html" class="block mb-4">Dashboard</a>
<a href="upload.html" class="block mb-4 font-bold">Upload Data</a>
<a href="analyze_image.html" class="block mb-4">Analyze Image</a>
<a href="generate_report.html" class="block mb-4">Generate Report</a>
<a href="rag_report.html" class="block mb-4">RAG Report</a>
<a href="report_history.html" class="block mb-4">Report History</a>
<a href="analytics.html" class="block mb-4">Analytics</a>

</div>

<!-- MAIN CONTENT -->

<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-6">Upload Files</h1>

<p class="text-gray-600 mb-8">
Upload datasets or documents for AI safety analysis.
</p>

<!-- UPLOAD BOX -->

<div class="bg-white p-10 rounded-xl shadow max-w-xl text-center">

<input
type="file"
id="fileInput"
class="mb-4"
/>

<p id="fileName" class="text-gray-600 mb-4"></p>

<button
onclick="uploadFile()"
class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700"
>
Upload File
</button>

</div>

<!-- STATUS -->

<div id="status" class="mt-6 font-semibold text-green-600"></div>

</div>

</div>

<script>

const input = document.getElementById("fileInput");

input.onchange = () => {

const file = input.files[0];

if(file){
document.getElementById("fileName").innerText =
"Selected file: " + file.name;
}

};

async function uploadFile(){

const file = input.files[0];

if(!file){
alert("Please select a file");
return;
}

const formData = new FormData();
formData.append("file", file);

const response = await fetch(
"http://localhost:8000/upload",
{
method:"POST",
body: formData
}
);

const result = await response.json();

document.getElementById("status").innerText =
"Upload successful";

}

</script>

</body>
</html>
<!-- Upload Page -->
