<!DOCTYPE html>
<html>
<head>
<title>Download Report</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

<!-- SIDEBAR -->

<div class="w-64 bg-blue-700 text-white min-h-screen p-6">

<h2 class="text-2xl font-bold mb-8">AI Safety</h2>

<a href="../dashboard.html" class="block mb-4">Dashboard</a>
<a href="analyze_image.html" class="block mb-4">Analyze Image</a>
<a href="generate_report.html" class="block mb-4">Generate Report</a>
<a href="report_history.html" class="block mb-4">Report History</a>
<a href="analytics.html" class="block mb-4">Analytics</a>
<a href="download_report.html" class="block mb-4 font-bold">Download Report</a>

</div>


<!-- MAIN CONTENT -->

<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-6">Download Report</h1>

<p class="text-gray-600 mb-8">
Enter a report ID to download the generated safety report.
</p>


<!-- DOWNLOAD CARD -->

<div class="bg-white p-8 rounded-xl shadow max-w-xl">

<label class="block mb-2 font-semibold">Report ID</label>

<input
id="reportId"
class="w-full border p-2 rounded mb-4"
placeholder="Enter report ID"
/>

<button
onclick="downloadReport()"
class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700"
>
Download Report
</button>

</div>


<!-- STATUS -->

<div id="status" class="mt-6 text-green-600 font-semibold"></div>

</div>

</div>


<script>

async function downloadReport(){

const id = document.getElementById("reportId").value;

if(!id){

alert("Please enter a report ID");
return;

}

const url = "http://localhost:8000/report/download/" + id;

window.open(url, "_blank");

document.getElementById("status").innerText =
"Downloading report...";

}

</script>

</body>
</html>
