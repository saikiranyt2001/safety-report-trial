<!DOCTYPE html>
<html>
<head>
<title>Analyze Image</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

<!-- SIDEBAR -->

<div class="w-64 bg-blue-700 text-white min-h-screen p-6">

<h2 class="text-2xl font-bold mb-8">AI Safety</h2>

<a href="../dashboard.html" class="block mb-4">Dashboard</a>
<a href="analyze_image.html" class="block mb-4 font-bold">Analyze Image</a>
<a href="generate_report.html" class="block mb-4">Generate Report</a>
<a href="report_history.html" class="block mb-4">Report History</a>
<a href="analytics.html" class="block mb-4">Analytics</a>

</div>


<!-- MAIN CONTENT -->

<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-6">Analyze Image</h1>

<p class="text-gray-600 mb-8">
Upload an image to analyze for safety risks.
</p>


<!-- UPLOAD CARD -->

<div class="bg-white p-8 rounded-xl shadow max-w-xl">

<input
type="file"
id="imageInput"
accept="image/*"
class="mb-4"
/>

<img id="preview" class="mb-4 rounded hidden" width="300">

<button
onclick="analyzeImage()"
class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700"
>
Analyze Image
</button>

</div>


<!-- RESULTS -->

<div id="results" class="mt-10 hidden">

<h2 class="text-xl font-bold mb-4">Analysis Result</h2>

<div class="bg-white p-6 rounded shadow max-w-xl">

<p><b>Risk Level:</b> <span id="risk"></span></p>

<p class="mt-2"><b>Explanation:</b></p>

<p id="explanation" class="text-gray-700"></p>

</div>

</div>

</div>

</div>


<script>

const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

input.onchange = () => {

const file = input.files[0];

if(file){

preview.src = URL.createObjectURL(file);
preview.classList.remove("hidden");

}

};


async function analyzeImage(){

const file = input.files[0];

if(!file){

alert("Please upload an image");

return;

}

const formData = new FormData();
formData.append("file", file);


const response = await fetch("http://localhost:8000/analyze-image",{

method:"POST",
body:formData

});

const data = await response.json();

document.getElementById("risk").innerText = data.risk;
document.getElementById("explanation").innerText = data.explanation;

document.getElementById("results").classList.remove("hidden");

}

</script>

</body>
</html>
