<!DOCTYPE html>
<html>
<head>
    <title>Report History</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 40px; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 700px; margin: auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; }
        th { background: #2563eb; color: white; }
        tr:hover { background: #f1f5f9; }
        .download-btn { background: #2563eb; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Report History</h2>
        <table>
            <tr><th>Date</th><th>Industry</th><th>Hazard</th><th>Location</th><th>Download</th></tr>
            <tr><td>2026-03-01</td><td>Construction</td><td>Heights</td><td>Sydney</td><td><button class="download-btn">PDF</button></td></tr>
            <tr><td>2026-02-20</td><td>Manufacturing</td><td>Machinery</td><td>Melbourne</td><td><button class="download-btn">PDF</button></td></tr>
        </table>
    </div>
</body>
</html>
