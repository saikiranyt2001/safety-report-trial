<!-- Project form page -->

<!DOCTYPE html>
<html>

<head>

<title>AI Safety Platform</title>

<style>

body{
font-family: Arial;
margin:40px;
background:#f5f5f5;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#result{
margin-top:20px;
background:#eee;
padding:15px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Safety Report Generator</h2>

<label>Industry</label>
<input id="industry" placeholder="Construction">

<label>Hazard</label>
<input id="hazard" placeholder="Working at heights">

<label>Location</label>
<input id="location" placeholder="Sydney">

<label>Crew Size</label>
<input id="crew" type="number" value="5">

<button onclick="generateReport()">Generate Report</button>

<div id="result"></div>

</div>

<script>

async function generateReport(){

const industry = document.getElementById("industry").value
const hazard = document.getElementById("hazard").value
const location = document.getElementById("location").value
const crew = document.getElementById("crew").value

const response = await fetch("http://127.0.0.1:8000/generate-report",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
industry:industry,
hazard:hazard,
location:location,
crew:crew
})

})

const data = await response.json()

document.getElementById("result").innerText = data.report

}

</script>

</body>

</html>
