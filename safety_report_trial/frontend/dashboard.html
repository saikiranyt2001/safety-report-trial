<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Safety Platform</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: #f4f6f9;
		}
		.navbar {
			background: #1f2937;
			color: white;
			padding: 15px 40px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		.navbar h2 { margin: 0; }
		.nav-links a {
			color: white;
			margin-left: 20px;
			text-decoration: none;
			font-weight: bold;
		}
		.nav-links a:hover { color: #60a5fa; }
		.hero {
			background: url("https://images.unsplash.com/photo-1581093588401-12d9c6d1f3c4") center/cover;
			height: 220px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: white;
			font-size: 30px;
			font-weight: bold;
		}
		.container {
			background: white;
			padding: 40px;
			border-radius: 12px;
			max-width: 650px;
			margin: -60px auto 40px auto;
			box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
		}
		label { font-weight: bold; }
		input, select {
			width: 100%;
			padding: 12px;
			margin-top: 6px;
			margin-bottom: 18px;
			border-radius: 6px;
			border: 1px solid #ccc;
			font-size: 14px;
		}
		button {
			width: 100%;
			padding: 14px;
			background: #2563eb;
			color: white;
			border: none;
			border-radius: 6px;
			font-size: 16px;
			cursor: pointer;
		}
		button:hover { background: #1d4ed8; }
		#result {
			margin-top: 20px;
			background: #f1f5f9;
			padding: 15px;
			border-radius: 8px;
			white-space: pre-wrap;
		}
		.footer {
			background: #1f2937;
			color: white;
			text-align: center;
			padding: 20px;
			margin-top: 40px;
		}
		.loading {
			text-align: center;
			font-weight: bold;
			color: #2563eb;
		}
	</style>
</head>
<body>
	<div class="hero">
		Workplace Safety Report Generator
	</div>
	<div class="container">
		<h2>Login</h2>
		<input id="login-username" placeholder="Username">
		<input id="login-password" type="password" placeholder="Password">
		<button onclick="login()">Login</button>
		<div id="login-result"></div>
		<hr>
		<h2>Generate Safety Report</h2>
		<label>Industry</label>
		<input id="industry" placeholder="Construction">
		<label>Hazard</label>
		<input id="hazard" placeholder="Working at heights">
		<label>Location</label>
		<input id="location" placeholder="Sydney">
		<label>Crew Size</label>
		<input id="crew" type="number" value="5">
		<label>Project</label>
		<select id="project-select"></select>
		<button onclick="generateReport()">Generate AI Report</button>
		<div id="result"></div>
		<button id="downloadPdfBtn" style="margin-top:10px;display:none;" onclick="downloadPDF()">Download PDF</button>
		<hr>
		<h2>Report History</h2>
		<div id="report-history"></div>
		<hr>
		<h2>Analytics</h2>
		<div id="analytics"></div>
		<hr>
		<h2>AI Assistant</h2>
		<input id="chat-input" placeholder="Ask a safety question...">
		<button onclick="sendChat()">Send</button>
		<div id="chat-result"></div>
	</div>
	<div class="footer">
		AI Safety Platform © 2026
	</div>
	<script>
		// Set your backend URL here. For local: "/generate-report". For deployed: "https://your-backend-url/generate-report"
		let accessToken = "";
		let selectedProjectId = 1;

		async function login() {
			const username = document.getElementById("login-username").value;
			const password = document.getElementById("login-password").value;
			const resultBox = document.getElementById("login-result");
			resultBox.innerHTML = "<div class='loading'>Logging in...</div>";
			try {
				const response = await fetch("/login", {
					method: "POST",
					headers: { "Content-Type": "application/x-www-form-urlencoded" },
					body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
				});
				const data = await response.json();
				if (data.access_token) {
					accessToken = data.access_token;
					resultBox.innerText = "Login successful!";
					loadProjects();
					loadAnalytics();
				} else {
					resultBox.innerText = "Login failed.";
				}
			} catch (error) {
				resultBox.innerText = `Error: ${error.message}`;
			}
		}

		async function loadProjects() {
			// For demo, use company_id=1
			const response = await fetch(`/projects/1`);
			const projects = await response.json();
			const select = document.getElementById("project-select");
			select.innerHTML = "";
			projects.forEach(p => {
				const opt = document.createElement("option");
				opt.value = p.id;
				opt.text = p.name;
				select.appendChild(opt);
			});
			if (projects.length) {
				selectedProjectId = projects[0].id;
				select.value = selectedProjectId;
				select.onchange = () => {
					selectedProjectId = select.value;
					loadReportHistory();
				};
				loadReportHistory();
			}
		}

		async function generateReport() {
			const industry = document.getElementById("industry").value;
			const hazard = document.getElementById("hazard").value;
			const location = document.getElementById("location").value;
			const crew = document.getElementById("crew").value;
			const resultBox = document.getElementById("result");
			resultBox.innerHTML = "<div class='loading'>Generating AI Safety Report...</div>";
			try {
				const response = await fetch("/generate-report", {
					method: "POST",
					headers: {
						"Content-Type": "application/json",
						...(accessToken ? { "Authorization": `Bearer ${accessToken}` } : {})
					},
					body: JSON.stringify({
						industry,
						hazard,
						location,
						crew: Number(crew),
						project_id: selectedProjectId
					})
				});
				const data = await response.json();
				document.getElementById("result").innerText = data.report;
				document.getElementById("downloadPdfBtn").style.display = data.report ? "inline-block" : "none";
				window.generatedReportText = data.report || "";
				loadReportHistory();
			} catch (error) {
				resultBox.innerText = `Error: ${error.message}`;
				document.getElementById("downloadPdfBtn").style.display = "none";
			}
		}

		async function loadReportHistory() {
			const historyBox = document.getElementById("report-history");
			historyBox.innerHTML = "<div class='loading'>Loading report history...</div>";
			try {
				const response = await fetch(`/report-history/${selectedProjectId}`);
				const history = await response.json();
				if (history.length === 0) {
					historyBox.innerText = "No reports yet.";
				} else {
					historyBox.innerHTML = history.map(r => `<div><b>${new Date(r.created_at).toLocaleString()}</b><br>${r.content}</div><hr>`).join("");
				}
			} catch (error) {
				historyBox.innerText = `Error: ${error.message}`;
			}
		}

		async function loadAnalytics() {
			const analyticsBox = document.getElementById("analytics");
			analyticsBox.innerHTML = "<div class='loading'>Loading analytics...</div>";
			try {
				const response = await fetch(`/analytics/1`);
				const data = await response.json();
				analyticsBox.innerHTML = `<b>Total Projects:</b> ${data.total_projects}<br><b>Total Reports:</b> ${data.total_reports}`;
			} catch (error) {
				analyticsBox.innerText = `Error: ${error.message}`;
			}
		}

		async function sendChat() {
			const chatInput = document.getElementById("chat-input").value;
			const chatResult = document.getElementById("chat-result");
			chatResult.innerHTML = "<div class='loading'>Thinking...</div>";
			try {
				const response = await fetch("/chat", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ message: chatInput })
				});
				const data = await response.json();
				chatResult.innerText = data.reply;
			} catch (error) {
				chatResult.innerText = `Error: ${error.message}`;
			}
		}

		// Simple PDF download using jsPDF
		function downloadPDF() {
			if (!window.generatedReportText) return;
			const doc = new window.jspdf.jsPDF();
			doc.setFontSize(12);
			doc.text(window.generatedReportText, 10, 10);
			doc.save("Safety_Report.pdf");
		}
	</script>
</body>
<!-- jsPDF library for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</html>
