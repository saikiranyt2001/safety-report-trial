<!-- safety_kpi_dashboard.html -->
<!-- Example integration for safety_kpi.js -->
<!DOCTYPE html>
<html>
<head>
    <title>Safety KPI Dashboard</title>
    <script src="safety_kpi.js"></script>
    <style>
        .kpi-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .kpi-card {
            background: #f5f5f5;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 24px;
            min-width: 180px;
            text-align: center;
        }
        .kpi-card h3 {
            margin-bottom: 8px;
            color: #1976d2;
        }
        .kpi-card p {
            font-size: 2em;
            margin: 0;
            color: #333;
        }
    </style>
</head>
<body>
    <h2>Safety KPI Dashboard</h2>
    <div id="kpiDashboard"></div>
    <script>
        const kpiData = {
            totalHazards: 42,
            highRiskHazards: 7,
            nearMisses: 3,
            complianceScore: 95,
            incidentRate: 0.8
        };
        renderSafetyKPIs('kpiDashboard', kpiData);
    </script>
</body>
</html>
