<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Industrial Safety Report Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc");

background-size:cover;
background-position:center;

}

/* dark overlay */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

/* login card */

.login-box{

position:relative;
z-index:1;

width:380px;
padding:40px;

background:rgba(255,255,255,0.08);

backdrop-filter: blur(12px);

border-radius:10px;

box-shadow:0 10px 40px rgba(0,0,0,0.6);

color:white;

text-align:center;

}

h1{
font-size:26px;
margin-bottom:5px;
}

.subtitle{
font-size:14px;
margin-bottom:25px;
color:#ddd;
}

/* inputs */

input{

width:100%;
padding:12px;
margin:10px 0;

border:none;
border-radius:6px;

outline:none;

}

/* button */

.login-btn{

width:100%;
padding:12px;

background:#ff9800;

border:none;

border-radius:6px;

font-size:16px;

color:white;

cursor:pointer;

transition:0.3s;

}

.login-btn:hover{

background:#f57c00;

}

/* social */

.social{

margin-top:25px;

}

.social p{

font-size:13px;
margin-bottom:10px;
color:#ccc;

}

.social-buttons{

display:flex;
gap:10px;

}

.social-buttons button{

flex:1;

padding:10px;

border:none;

border-radius:6px;

background:white;

font-size:13px;

cursor:pointer;

}

.social-buttons button:hover{

background:#ddd;

}

</style>

</head>

<body>

<div class="login-box">

<h1>Industrial Safety AI</h1>

<p class="subtitle">AI Powered Safety Report Generator</p>

<form>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<button class="login-btn">Login</button>

</form>

<div class="social">

<p>or continue with</p>

<div class="social-buttons">

<button>Google</button>

<button>GitHub</button>

<button>LinkedIn</button>

</div>

</div>

</div>

</body>
</html>
