<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 40px; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 700px; margin: auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Analytics Dashboard</h2>
        <canvas id="reportChart" width="600" height="300"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('reportChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Reports Generated',
                    data: [12, 19, 7, 14, 10, 16],
                    backgroundColor: '#2563eb'
                }]
            },
            options: { responsive: true }
        });
    </script>
</body>
</html>
